<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadSeek — Досье</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ----- СПЕЦИФИЧНЫЕ СТИЛИ ДЛЯ ДОСЬЕ (без изменений) ----- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .card {
            background: #1c1614;
            border: 1px solid #3a2a28;
            border-radius: 8px;
            padding: 14px 14px 12px;
            cursor: pointer;
            transition: 0.15s;
        }
        .card:hover {
            border-color: #884444;
            background: #221c1a;
        }
        body.light .card {
            background: #e6ddd6;
            border-color: #b8a89c;
        }
        body.light .card:hover {
            background: #f0e8e0;
        }
        .card .name {
            font-size: 20px;
            font-family: 'Cinzel', serif;
            color: #eeccbb;
            border-bottom: 1px solid #3a2a28;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        body.light .card .name { color: #4a3228; border-bottom-color: #b8a89c; }
        .card .role {
            display: inline-block;
            font-size: 12px;
            background: #2a1a18;
            padding: 0 10px;
            border-radius: 10px;
            color: #cc8877;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        body.light .card .role { background: #d0c0b0; color: #5a3a2a; }
        .card .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
            font-size: 13px;
            color: #bbaa99;
        }
        body.light .card .stats { color: #5a4a40; }
        .card .stats span {
            background: #251e1b;
            padding: 1px 6px;
            border-radius: 3px;
            border-left: 2px solid #662222;
        }
        body.light .card .stats span { background: #ddd0c0; border-left-color: #aa8877; }
        .card .abilities-preview {
            margin-top: 8px;
            font-size: 12px;
            color: #998877;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .card .abilities-preview .tag {
            background: #2a1f1c;
            padding: 0 8px;
            border-radius: 10px;
            border: 1px solid #3a2a28;
            font-size: 11px;
        }
        body.light .card .abilities-preview .tag { background: #d0c0b0; border-color: #b8a89c; color: #3a2a1a; }
        .table-wrap {
            overflow-x: auto;
            margin: 25px 0 10px;
            background: #1c1614;
            border-radius: 8px;
            border: 1px solid #3a2a28;
            padding: 6px 0;
        }
        body.light .table-wrap { background: #e6ddd6; border-color: #b8a89c; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #2a1a18;
            color: #ffaa77;
            padding: 8px 6px;
            text-align: center;
            border-bottom: 2px solid #662222;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            user-select: none;
        }
        body.light th { background: #d0c0b0; color: #4a2a1a; border-bottom-color: #aa8877; }
        th:hover { background: #3a2220; }
        body.light th:hover { background: #c0b0a0; }
        td {
            padding: 7px 6px;
            text-align: center;
            border-bottom: 1px solid #2a1e1c;
        }
        body.light td { border-bottom-color: #c0b0a0; }
        tr:hover td { background: #251e1b; }
        body.light tr:hover td { background: #f0e8e0; }
        .role-killer td:first-child { color: #ff8866; }
        .role-survivor td:first-child { color: #88bbdd; }
        body.light .role-killer td:first-child { color: #aa4422; }
        body.light .role-survivor td:first-child { color: #336699; }
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1c1614;
            border: 1px solid #553333;
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px 20px;
        }
        body.light .modal-content { background: #f0ebe5; border-color: #b8a89c; }
        .modal-content .close {
            float: right;
            font-size: 28px;
            color: #887766;
            cursor: pointer;
            line-height: 1;
        }
        .modal-content .close:hover { color: #cc4444; }
        body.light .modal-content .close { color: #5a4a40; }
        body.light .modal-content .close:hover { color: #aa2222; }
        .modal-content h2 {
            font-family: 'Cinzel', serif;
            color: #eeccbb;
            border-bottom: 2px solid #662222;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        body.light .modal-content h2 { color: #4a3228; border-bottom-color: #aa8877; }
        .modal-content .ability {
            background: #251e1b;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-left: 3px solid #662222;
        }
        body.light .modal-content .ability { background: #e6ddd6; border-left-color: #aa8877; }
        .modal-content .ability .ab-name {
            font-weight: bold;
            color: #ffaa77;
            font-size: 17px;
        }
        body.light .modal-content .ability .ab-name { color: #8a4a2a; }
        .modal-content .ability .ab-details {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            font-size: 13px;
            color: #bbaa99;
            margin: 4px 0;
        }
        body.light .modal-content .ability .ab-details { color: #5a4a40; }
        .modal-content .ability .ab-details span {
            background: #2a1f1c;
            padding: 0 8px;
            border-radius: 10px;
        }
        body.light .modal-content .ability .ab-details span { background: #d0c0b0; }
        .modal-content .ability .ab-desc {
            margin-top: 6px;
            color: #d4c8b8;
            font-size: 14px;
            background: #0f0b0a;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 2px solid #884444;
        }
        body.light .modal-content .ability .ab-desc {
            color: #2a1e1c;
            background: #faf5f0;
            border-left-color: #aa6666;
        }
        .modal-content .no-abilities {
            color: #887766;
            font-style: italic;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 15px;
            justify-content: center;
            background: #1a1412;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #3a2a28;
            margin-bottom: 25px;
        }
        body.light .controls {
            background: #e6ddd6;
            border-color: #b8a89c;
        }
        .controls input[type="text"] {
            background: #1e1614;
            border: 1px solid #553333;
            color: #d4c8b8;
            padding: 6px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            min-width: 160px;
        }
        body.light .controls input[type="text"] {
            background: #faf5f0;
            border-color: #b8a89c;
            color: #2a1e1c;
        }
        .controls .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .controls .filters button,
        .controls .role-tabs button {
            background: transparent;
            border: 1px solid #553333;
            color: #bbaaa0;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: 0.15s;
        }
        body.light .controls .filters button,
        body.light .controls .role-tabs button {
            border-color: #b8a89c;
            color: #5a4a40;
        }
        .controls .filters button:hover,
        .controls .role-tabs button:hover {
            background: #332222;
            border-color: #884444;
            color: #f0ddd0;
        }
        body.light .controls .filters button:hover,
        body.light .controls .role-tabs button:hover {
            background: #d0c0b0;
            border-color: #aa8877;
            color: #2a1a10;
        }
        .controls .filters button.active,
        .controls .role-tabs button.active {
            background: #661111;
            border-color: #cc2222;
            color: #fff;
        }
        body.light .controls .filters button.active,
        body.light .controls .role-tabs button.active {
            background: #aa4444;
            border-color: #882222;
            color: #fff;
        }
        .controls .role-tabs button {
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 4px 14px;
            font-size: 15px;
        }
        .controls .role-tabs button.active {
            border-bottom-color: #cc2222;
            background: transparent;
            color: #ffcccc;
        }
        body.light .controls .role-tabs button.active {
            border-bottom-color: #882222;
            color: #4a2a1a;
        }
        @media (max-width: 600px) {
            .card-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls .filters { justify-content: center; }
        }

</head>

                    { name: { ru: "Пронзание", en: "Pierce" }, type: { ru: "Урон", en: "Damage" }, value: 30, duration: "-", cooldown: "15s", radius: "[Uknown]", description: { ru: "Наносит 30 урона.", en: "Deals 30 damage." } },
                    { name: { ru: "Call of Undead", en: "Call of Undead" }, type: { ru: "clones", en: "clones" }, value: "[random]", duration: "-", cooldown: "50s", radius: "-", description: { ru: "Призывает приспешников. Количество зависит от убитых выживших. Длится бесконечно.", en: "Summons minions. Number depends on killed survivors. Lasts forever." } },
                    { name: { ru: "Ritual", en: "Ritual" }, type: { ru: "+hitbox distants", en: "+hitbox range" }, value: "[Uknown]", duration: "25s", cooldown: "90s", radius: "-", description: { ru: "Добавляет дополнительные конечности, увеличивая хитбокс на 25 секунд.", en: "Adds extra limbs, increasing hitbox for 25 seconds." } }
                ]
            },
            // ---------- Экзарцист (Exorcist) ----------
            {
                name: { ru: "Экзарцист", en: "Exorcist" },
                role: { ru: "Выживший", en: "Survivor" },
                hp: 80,
                speed: 22.0,
                baseDmg: { ru: "- + stun 2s", en: "- + stun 2s" },
                baseCd: "30s",
                abilities: [
                    { name: { ru: "Взмах", en: "Swipe" }, type: { ru: "Slownes", en: "Slow" }, value: "1.5x", duration: "5s", cooldown: "40s", radius: "[Uknown]", description: { ru: "Замедляет убийцу в 1.5 раза на 5 секунд.", en: "Slows the killer by 1.5x for 5 seconds." } },
                    { name: { ru: "Anti-Attack", en: "Anti-Attack" }, type: { ru: "disable attacks", en: "disable attacks" }, value: "-", duration: "30s", cooldown: "120s", radius: "-", description: { ru: "Блокирует любую способность убийцы на 30 секунд.", en: "Blocks all killer abilities for 30 seconds." } },
                    { name: { ru: "Harmony", en: "Harmony" }, type: { ru: "Random hp", en: "Random HP" }, value: "-", duration: "-", cooldown: "40s", radius: "-", description: { ru: "Увеличивает или уменьшает HP случайным образом. Зависит от уровня паники, который снижается после удачного стана.", en: "Randomly increases or decreases HP. Depends on panic level, reduced after successful stun." } }
                ]
            }
        ];

        // ------------------------------------------------------------
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ ДВУЯЗЫЧНЫХ ДАННЫХ
        // ------------------------------------------------------------
        function getLocalized(obj, lang) {
            if (typeof obj === 'object' && obj !== null && (obj.ru || obj.en)) {
                return obj[lang] || obj.ru;
            }
            return obj;
        }

        // Получаем текущий язык
        let lang = localStorage.getItem('lang') || 'ru';

        // ------------------------------------------------------------
        //  ЛОГИКА РЕНДЕРИНГА
        // ------------------------------------------------------------
        let currentRole = 'all';
        let currentAbilityType = 'all';
        let searchQuery = '';
        let sortField = 'name';
        let sortAsc = true;

        function getFiltered() {
            return characters.filter(c => {
                const name = getLocalized(c.name, lang);
                const role = getLocalized(c.role, lang);
                if (currentRole !== 'all' && role !== currentRole) return false;
                if (searchQuery && !name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                if (currentAbilityType !== 'all') {
                    const hasType = c.abilities.some(a => getLocalized(a.type, lang) === currentAbilityType);
                    if (!hasType) return false;
                }
                return true;
            });
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const filtered = getFiltered();
            grid.innerHTML = '';
            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                const name = getLocalized(c.name, lang);
                const role = getLocalized(c.role, lang);
                const baseDmg = getLocalized(c.baseDmg, lang);
                const tags = c.abilities.slice(0, 3).map(a => `<span class="tag">${getLocalized(a.type, lang)}</span>`).join('');
                const more = c.abilities.length > 3 ? `<span class="tag">+${c.abilities.length-3}</span>` : '';
                card.innerHTML = `
                    <div class="name">${name}</div>
                    <div class="role">${role}</div>
                    <div class="stats">
                        <span>❤️ ${c.hp}</span>
                        <span>🏃 ${c.speed}</span>
                        <span>⚔️ ${baseDmg}</span>
                        <span>⏱️ ${c.baseCd}</span>
                    </div>
                    <div class="abilities-preview">${tags} ${more}</div>
                `;
                card.addEventListener('click', () => openModal(c));
                grid.appendChild(card);
            });
            renderTable(filtered);
        }

        function renderTable(chars) {
            const tbody = document.getElementById('tableBody');
            const sorted = [...chars].sort((a, b) => {
                let va, vb;
                if (sortField === 'name') {
                    va = getLocalized(a.name, lang).toLowerCase();
                    vb = getLocalized(b.name, lang).toLowerCase();
                } else if (sortField === 'role') {
                    va = getLocalized(a.role, lang).toLowerCase();
                    vb = getLocalized(b.role, lang).toLowerCase();
                } else if (sortField === 'dmg') {
                    va = parseFloat(getLocalized(a.baseDmg, lang)) || 0;
                    vb = parseFloat(getLocalized(b.baseDmg, lang)) || 0;
                } else {
                    va = a[sortField];
                    vb = b[sortField];
                }
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
            tbody.innerHTML = '';
            sorted.forEach(c => {
                const tr = document.createElement('tr');
                const role = getLocalized(c.role, lang);
                tr.className = role === 'Киллер' || role === 'Killer' ? 'role-killer' : 'role-survivor';
                tr.innerHTML = `
                    <td>${getLocalized(c.name, lang)}</td>
                    <td>${role}</td>
                    <td>${c.hp}</td>
                    <td>${c.speed}</td>
                    <td>${getLocalized(c.baseDmg, lang)}</td>
                    <td>${c.baseCd}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ------------------------------------------------------------
        //  МОДАЛЬНОЕ ОКНО
        // ------------------------------------------------------------
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalAbilities = document.getElementById('modalAbilities');
        const modalClose = document.getElementById('modalClose');

        function openModal(char) {
            const name = getLocalized(char.name, lang);
            modalTitle.textContent = `${name} — ${lang === 'ru' ? 'способности' : 'abilities'}`;
            modalAbilities.innerHTML = '';
            if (char.abilities.length === 0) {
                modalAbilities.innerHTML = `<div class="no-abilities">${lang === 'ru' ? 'Нет способностей' : 'No abilities'}</div>`;
            } else {
                char.abilities.forEach(ab => {
                    const div = document.createElement('div');
                    div.className = 'ability';
                    const abName = getLocalized(ab.name, lang);
                    const abType = getLocalized(ab.type, lang);
                    const desc = getLocalized(ab.description, lang) || (lang === 'ru' ? 'Описание отсутствует.' : 'Description missing.');
                    div.innerHTML = `
                        <div class="ab-name">${abName}</div>
                        <div class="ab-details">
                            <span>${lang === 'ru' ? 'Тип' : 'Type'}: ${abType}</span>
                            <span>${lang === 'ru' ? 'Величина' : 'Value'}: ${ab.value}</span>
                            <span>${lang === 'ru' ? 'Длит' : 'Dur'}: ${ab.duration}</span>
                            <span>${lang === 'ru' ? 'Кулдаун' : 'CD'}: ${ab.cooldown}</span>
                            <span>${lang === 'ru' ? 'Радиус' : 'Radius'}: ${ab.radius}</span>
                        </div>
                        <div class="ab-desc">${desc}</div>
                    `;
                    modalAbilities.appendChild(div);
                });
            }
            modal.classList.add('show');
        }

        function closeModal() { modal.classList.remove('show'); }
        modalClose.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // ------------------------------------------------------------
        //  ОБРАБОТЧИКИ ИНТЕРФЕЙСА
        // ------------------------------------------------------------
        document.querySelectorAll('.role-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRole = this.dataset.role;
                renderCards();
            });
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            renderCards();
        });

        // Фильтр по типу способности
        const abilityTypes = [...new Set(characters.flatMap(c => c.abilities.map(a => getLocalized(a.type, lang))))];
        const filterContainer = document.getElementById('abilityFilter');
        // Очищаем старые кнопки, кроме первой ("Все типы")
        while (filterContainer.children.length > 1) filterContainer.removeChild(filterContainer.lastChild);
        abilityTypes.forEach(type => {
            const btn = document.createElement('button');
            btn.dataset.type = type;
            btn.textContent = type;
            btn.addEventListener('click', function() {
                document.querySelectorAll('#abilityFilter button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentAbilityType = this.dataset.type;
                renderCards();
            });
            filterContainer.appendChild(btn);
        });

        document.querySelectorAll('#summaryTable th[data-sort]').forEach(th => {
            th.addEventListener('click', function() {
                const field = this.dataset.sort;
                if (sortField === field) sortAsc = !sortAsc;
                else { sortField = field; sortAsc = true; }
                renderCards();
            });
        });

        // ------------------------------------------------------------
        //  ПЕРЕРИСОВКА ПРИ СМЕНЕ ЯЗЫКА
        // ------------------------------------------------------------
        // Сохраним оригинальную функцию applyLang из script.js
        // Мы переопределим её частично, чтобы перерисовывать досье
        const originalApplyLang = window.applyLang;
        window.applyLang = function(lang) {
            if (originalApplyLang) originalApplyLang(lang);
            // Обновляем глобальную переменную и перерисовываем
            window.lang = lang;
            // Обновляем фильтры типов способностей (они зависят от языка)
            const newTypes = [...new Set(characters.flatMap(c => c.abilities.map(a => getLocalized(a.type, lang))))];
            const filterContainer = document.getElementById('abilityFilter');
            while (filterContainer.children.length > 1) filterContainer.removeChild(filterContainer.lastChild);
            newTypes.forEach(type => {
                const btn = document.createElement('button');
                btn.dataset.type = type;
                btn.textContent = type;
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#abilityFilter button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentAbilityType = this.dataset.type;
                    renderCards();
                });
                filterContainer.appendChild(btn);
            });
            // Перерисовываем
            renderCards();
        };

        // ------------------------------------------------------------
        //  СТАРТ
        // ------------------------------------------------------------
        // Устанавливаем глобальный язык
        window.lang = localStorage.getItem('lang') || 'ru';
        renderCards();
    </script>
</body>
</html>
